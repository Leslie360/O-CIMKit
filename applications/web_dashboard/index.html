<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-CIMKit | Neural Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-glow"></div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="gradient-text">O-CIMKit</span>
            <span class="badge">v1.0</span>
        </div>
        <div class="nav-links">
            <button class="btn primary" onclick="startSimulation()">Initialize Array</button>
        </div>
    </nav>

    <main class="dashboard">
        <!-- Hardware Architecture Panel -->
        <section class="panel glass">
            <h2>Hardware Profiler</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <span class="label">Energy Efficiency</span>
                    <span class="value gradient-text" id="efficiency">-- TOPS/W</span>
                </div>
                <div class="metric-card">
                    <span class="label">Inference Latency</span>
                    <span class="value" id="latency">-- ms</span>
                </div>
                <div class="metric-card">
                    <span class="label">Array Area</span>
                    <span class="value" id="area">-- mm²</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="lossChart"></canvas>
            </div>
        </section>

        <!-- Live Crossbar Visualization -->
        <section class="panel glass crossbar-panel">
            <h2>Organic Memristor Array</h2>
            <p class="subtitle">Live Conductance State Mapping</p>
            <div class="crossbar-grid" id="crossbarGrid">
                <!-- Grid cells generated by JS -->
            </div>
            <div class="status-bar">
                <span>Device Degradation: <strong id="degradation" class="alert-text">0%</strong></span>
                <span>Active Neurons: <strong>1,024</strong></span>
            </div>
        </section>

        <!-- AIGC Nano-GPT Inference -->
        <section class="panel glass inference-panel">
            <h2>Nano-GPT Live Generation</h2>
            <div class="terminal">
                <div class="terminal-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <span class="terminal-title">bash - cim-inference</span>
                </div>
                <div class="terminal-body" id="terminalBody">
                    <span class="prompt">$> Waiting for array initialization...</span>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
